<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全部商家 - 智慧校园生活平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <i class="fas fa-graduation-cap"></i>
        <span>智慧校园</span>
      </a>
      <div class="navbar-nav">
        <a href="index.html">首页</a>
        <a href="merchants.html" class="active">全部商家</a>
      </div>
      <div class="navbar-search">
        <i class="fas fa-search"></i>
        <input type="text" id="navSearch" placeholder="搜索商家、服务..." onkeydown="if(event.key==='Enter') handleNavSearch()">
      </div>
    </div>
  </nav>

  <!-- 页面头部 -->
  <div class="page-header">
    <h1><i class="fas fa-store"></i> 全部商家</h1>
    <p>浏览校园内所有商家和服务，找到你需要的一切</p>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <div class="filter-bar-inner">
      <div class="filter-categories" id="filterCategories">
        <!-- JS 动态渲染 -->
      </div>
      <div class="filter-sort">
        <select id="sortSelect" onchange="handleSort()">
          <option value="default">默认排序</option>
          <option value="rating">评分最高</option>
          <option value="reviews">评价最多</option>
          <option value="hot">最热门</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 商家列表 -->
  <div class="merchant-list">
    <div class="merchant-list-grid" id="merchantGrid">
      <!-- JS 动态渲染 -->
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <i class="fas fa-search"></i>
      <h3>未找到相关商家</h3>
      <p>换个关键词试试吧</p>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-grid">
        <div class="footer-column">
          <div class="footer-brand">
            <i class="fas fa-graduation-cap"></i>
            智慧校园生活平台
          </div>
          <p class="footer-desc">
            智慧校园生活平台致力于为全校师生提供便捷的一站式校园生活服务。
            将校园内所有商家和服务统一接入平台，让校园生活更加美好。
          </p>
          <div class="footer-social">
            <a href="#"><i class="fab fa-weixin"></i></a>
            <a href="#"><i class="fab fa-weibo"></i></a>
            <a href="#"><i class="fab fa-qq"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
          </div>
        </div>
        <div class="footer-column">
          <h4>服务分类</h4>
          <a href="merchants.html?category=canteen">校园餐厅</a>
          <a href="merchants.html?category=supermarket">超市便利店</a>
          <a href="merchants.html?category=clinic">医务室</a>
          <a href="merchants.html?category=telecom">营业厅</a>
          <a href="merchants.html?category=swimming">游泳馆</a>
        </div>
        <div class="footer-column">
          <h4>更多服务</h4>
          <a href="merchants.html?category=gym">体育馆</a>
          <a href="merchants.html?category=library">图书馆</a>
          <a href="merchants.html?category=print">打印复印</a>
          <a href="merchants.html?category=bank">银行服务</a>
          <a href="merchants.html?category=cafe">咖啡奶茶</a>
        </div>
        <div class="footer-column">
          <h4>关于我们</h4>
          <a href="#">平台介绍</a>
          <a href="#">商家入驻</a>
          <a href="#">帮助中心</a>
          <a href="#">意见反馈</a>
          <a href="#">联系我们</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2024 智慧校园生活平台 · 阳光大学 | 让校园生活更美好</p>
      </div>
    </div>
  </footer>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <i class="fas fa-chevron-up"></i>
  </button>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initMerchantsPage();
    });
  </script>
</body>
</html>
